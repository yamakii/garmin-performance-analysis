name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      web: ${{ steps.filter.outputs.web }}
      meta: ${{ steps.filter.outputs.meta }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'packages/**'
              - 'pyproject.toml'
              - '.pre-commit-config.yaml'
              - '.github/workflows/**'
              - 'docs/**'
              - '**/*.md'
              - '.env.example'
            web:
              - 'packages/garmin-web/**'
              - '.github/workflows/**'
            meta:
              - '.claude/workflows/**'
              - '.claude/hooks/**'

  lint-and-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/garmin-mcp-server
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Check formatting with black
        run: uv run black --check .

      - name: Type check with mypy
        run: uv run mypy .

      - name: Run unit tests with coverage
        run: uv run pytest -m unit --tb=short -n 4 --maxfail=5 --cov=garmin_mcp --cov-report=term-missing --cov-fail-under=60

  web-backend:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/garmin-web
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Run unit and integration tests
        run: uv run pytest -m "unit or integration" --tb=short

  web-frontend:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/garmin-web/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/garmin-web/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build

  meta-checks:
    needs: changes
    if: needs.changes.outputs.meta == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax-smoke .claude scripts
        run: bash scripts/check-claude-scripts.sh

  ci-guard:
    needs: [changes, lint-and-test, web-backend, web-frontend, meta-checks]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check CI result
        run: |
          if [ "${{ needs.changes.outputs.code }}" == "false" ] && [ "${{ needs.changes.outputs.web }}" == "false" ] && [ "${{ needs.changes.outputs.meta }}" == "false" ]; then
            echo "No code/doc/meta changes — skipping CI"
            exit 0
          fi
          if [ "${{ needs.changes.outputs.code }}" == "true" ] && [ "${{ needs.lint-and-test.result }}" != "success" ]; then
            echo "lint-and-test failed"
            exit 1
          fi
          if [ "${{ needs.changes.outputs.web }}" == "true" ] && [ "${{ needs.web-backend.result }}" != "success" ]; then
            echo "web-backend failed"
            exit 1
          fi
          if [ "${{ needs.changes.outputs.web }}" == "true" ] && [ "${{ needs.web-frontend.result }}" != "success" ]; then
            echo "web-frontend failed"
            exit 1
          fi
          if [ "${{ needs.changes.outputs.meta }}" == "true" ] && [ "${{ needs.meta-checks.result }}" != "success" ]; then
            echo "meta-checks failed"
            exit 1
          fi
