[project]
name = "garmin-web"
version = "0.1.0"
description = "Web app for browsing Garmin running analysis results"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn>=0.30.0",
    "duckdb>=1.1.1",
    "garmin-mcp-server",
]

[project.scripts]
garmin-web = "garmin_web.cli:main"

[tool.uv.sources]
garmin-mcp-server = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=9.0.0",
    "httpx>=0.27.0",
    "ruff>=0.15.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/garmin_web"]

[tool.black]
line-length = 88
target-version = ['py312']

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "C4", "SIM"]
ignore = [
    "E501",
    "E402",
    "SIM105",
]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
check_untyped_defs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
minversion = "9.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "unit: Unit tests (fast, isolated)",
    "integration: Integration tests (moderate speed)",
    "performance: Performance benchmark tests",
    "slow: Slow tests (deselected by default)",
    "garmin_api: Tests that require Garmin API authentication (rate limited)",
]
addopts = """
    -m 'not garmin_api and not slow and not performance'
    --strict-markers
    --tb=short
    --disable-warnings
"""
cache_dir = ".pytest_cache"
